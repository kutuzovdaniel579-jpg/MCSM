<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>MCSM: FNAE HUB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b3b0b;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Achtergrondlaag (video of image) */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .bg-layer video,
    .bg-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .frame {
      background: #1b1b1b;
      border: 4px solid #000;
      box-shadow: 0 0 0 4px #3f3f3f, 0 0 40px rgba(0, 0, 0, 0.7);
      padding: 32px 40px 40px;
      max-width: 480px;
      width: 100%;
    }

    .title {
      font-family: "Minecraftia", monospace;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 24px;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 2px 2px #000;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #c0c0c0;
      margin-bottom: 24px;
    }

    .divider {
      height: 2px;
      background: linear-gradient(to right, #3b8526, #6bbf3a, #3b8526);
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      background: #3b8526;
      border: 3px solid #000;
      color: #f5f5f5;
      text-decoration: none;
      font-family: "Minecraftia", monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 14px;
      text-align: center;
      box-shadow: 0 4px 0 #1c3f11;
      cursor: pointer;
      transition: transform 80ms ease, box-shadow 80ms ease, filter 120ms ease;
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #1c3f11;
    }

    .btn.secondary {
      background: #2f4f7f;
      box-shadow: 0 4px 0 #15243b;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: #9a9a9a;
    }
  </style>
</head>
<body>
  <!-- Dynamische achtergrondlaag -->
  <div class="bg-layer" id="bg-layer"></div>

  <div class="frame">
    <div class="title">MCSM: FNAE HUB</div>
    <div class="subtitle">Kies je versie</div>
    <div class="divider"></div>

    <div class="buttons">
      <a class="btn" href="/FNAE1">FNAE 1</a>
      <a class="btn secondary" href="/FNAE2">FNAE 2</a>
    </div>

    <div class="footer">
      Powered by FoL • MCSM FNAE HUB
    </div>
  </div>

  <script>
    // === HIER PAS JE ALLEEN DIT AAN ===
    const BACKGROUND_SRC = "bg.png"; // kan .mp4, .jpg, .jpeg, .png zijn
    // ==================================

    const layer = document.getElementById("bg-layer");
    const isVideo = BACKGROUND_SRC.toLowerCase().endsWith(".mp4");

    if (isVideo) {
      const video = document.createElement("video");
      video.autoplay = true;
      video.loop = true;
      video.muted = true;
      video.playsInline = true;

      const source = document.createElement("source");
      source.src = BACKGROUND_SRC;
      source.type = "video/mp4";

      video.appendChild(source);
      layer.appendChild(video);
    } else {
      const img = document.createElement("img");
      img.src = BACKGROUND_SRC;
      img.alt = "Background";
      layer.appendChild(img);
    }
  </script>
</body>
</html>
