<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft 1.20.1 – Singleplayer</title>
  <style>
    * {
      box-sizing: border-box;
      image-rendering: pixelated;
      margin: 0;
      padding: 0;
      font-family: "Minecraftia", system-ui, sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: url("https://i.imgur.com/8KZt7uM.png") center/cover no-repeat fixed; /* vervang door eigen bg */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.75) 100%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 900px;
      max-width: 95vw;
      height: 520px;
      max-height: 90vh;
      background: rgba(0, 0, 0, 0.55);
      border: 2px solid #000;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.08);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .title-bar h1 {
      font-size: 24px;
      text-shadow: 2px 2px #000;
    }

    .title-bar span {
      font-size: 12px;
      opacity: 0.8;
      text-shadow: 1px 1px #000;
    }

    .world-list-wrapper {
      flex: 1;
      border: 2px solid #000;
      background: rgba(0, 0, 0, 0.6);
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .world-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .world-entry {
      background: rgba(32, 32, 32, 0.9);
      border: 2px solid #000;
      padding: 6px 8px;
      margin-bottom: 4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: background 80ms, border-color 80ms;
    }

    .world-entry:hover {
      background: rgba(48, 48, 48, 0.95);
    }

    .world-entry.selected {
      border-color: #ffff55;
      background: rgba(64, 64, 32, 0.95);
    }

    .world-name {
      font-size: 16px;
      text-shadow: 1px 1px #000;
    }

    .world-id {
      font-size: 11px;
      opacity: 0.8;
    }

    .world-meta {
      font-size: 11px;
      opacity: 0.9;
    }
