<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft 1.20.1 – Singleplayer</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    image-rendering: pixelated;
    font-family: "Minecraftia", sans-serif;
  }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: url("../assets/bg.png") center/cover no-repeat fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.75) 100%);
  }

  .menu {
    width: 900px;
    height: 520px;
    background: rgba(0,0,0,0.55);
    border: 2px solid #000;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .titlebar {
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    text-shadow: 2px 2px #000;
  }

  .world-list-box {
    flex: 1;
    border: 2px solid #000;
    background: rgba(0,0,0,0.6);
    padding: 6px;
    overflow-y: auto;
  }

  .world {
    background: rgba(32,32,32,0.9);
    border: 2px solid #000;
    padding: 6px 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: 80ms;
  }

  .world:hover {
    background: rgba(48,48,48,0.95);
  }

  .world.selected {
    border-color: #ffff55;
    background: rgba(64,64,32,0.95);
  }

  .world-name {
    font-size: 16px;
    text-shadow: 1px 1px #000;
  }

  .world-info {
    font-size: 11px;
    opacity: 0.8;
  }

  .bottom {
    display: grid;
    grid-template-columns: 3fr 1fr;
    gap: 10px;
  }

  .btn-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .btn-row-right {
    display: grid;
    grid-template-columns: 1fr;
  }

  .mc-btn {
    height: 26px;
    border: 2px solid #000;
    background: linear-gradient(#6b6b6b, #4b4b4b);
    color: #fff;
    text-shadow: 1px 1px #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    text-decoration: none;
  }

  .mc-btn:hover {
    background: linear-gradient(#7b7b7b, #5b5b5b);
  }

  .mc-btn:active {
    background: linear-gradient(#3b3b3b, #2b2b2b);
  }
</style>

</head>
<body>

<div class="vignette"></div>

<div class="menu">

  <div class="titlebar">
    <div>Select World</div>
  </div>

  <div class="world-list-box" id="worldList">
    <div class="world">
      <div class="world-name">xxx</div>
      <div class="world-info">Gamemode • dd/mm/yyyy • xx:xx</div>
    </div>

  <div class="bottom">
    <div class="btn-row">
      <a class="mc-btn" href="#">Play Selected World</a>
      <a class="mc-btn" href="#">Create New World</a>
      <a class="mc-btn" href="#">Edit</a>
      <a class="mc-btn" href="#">Delete</a>
      <a class="mc-btn" href="#">Re‑Create</a>
    </div>

    <div class="btn-row-right">
      <a class="mc-btn" href="../index.html">Cancel</a>
    </div>
  </div>

</div>

<script>
  const worldList = document.getElementById("worldList");
  const createBtn = document.querySelectorAll(".mc-btn")[1]; // tweede knop = Create New World

  // Selectie‑logica
  function refreshSelection() {
    const worlds = document.querySelectorAll(".world");
    worlds.forEach(w => {
      w.addEventListener("click", () => {
        document.querySelectorAll(".world").forEach(x => x.classList.remove("selected"));
        w.classList.add("selected");
      });
    });
  }

  refreshSelection();

  // Nieuwe wereld maken
  createBtn.addEventListener("click", () => {
    const count = document.querySelectorAll(".world").length + 1;

    const now = new Date();
    const dd = String(now.getDate()).padStart(2, "0");
    const mm = String(now.getMonth() + 1).padStart(2, "0");
    const yyyy = now.getFullYear();
    const hh = String(now.getHours()).padStart(2, "0");
    const min = String(now.getMinutes()).padStart(2, "0");

    const world = document.createElement("div");
    world.className = "world";
    world.innerHTML = `
      <div class="world-name">New World ${count}</div>
      <div class="world-info">Survival • ${dd}/${mm}/${yyyy} • ${hh}:${min}</div>
    `;

    worldList.prepend(world);
    refreshSelection();
  });
</script>

</body>
</html>
